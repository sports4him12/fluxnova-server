server:
  port: 8090   # Run on 8090 so it doesn't clash with the trip-planning app on 8080

camunda:
  bpm:
    admin-user:
      id: demo
      password: demo
      firstName: Demo
    filter:
      create: All tasks

spring:
  datasource:
    # H2 in-memory — engine state resets on restart; swap for MySQL later if needed
    url: jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
