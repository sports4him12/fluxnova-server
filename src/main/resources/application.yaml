server:
  port: 8090   # Run on 8090 so it doesn't clash with the trip-planning app on 8080

camunda:
  bpm:
    admin-user:
      id: demo
      password: demo
      firstName: Demo
    filter:
      create: All tasks
    auto-deployment-enabled: true     # deploys all *.bpmn from classpath on startup
    deploy-changed-only: false        # always redeploy so BPMN changes take effect after restart

spring:
  datasource:
    # H2 file-based — persists workflow state across restarts
    url: jdbc:h2:file:${user.home}/.fluxnova/camunda-db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
